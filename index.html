<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ログ成型ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #fdfcfa;
  --panel: #ffffff;
  --panel-2: #f0eeeb;
  --border: #e2ded9;
  --text: #2a2a2e;
  --text-sub: #6b6a70;
  --accent: #8a6d3b;
  --box-bg: #f4f1ea;
  --shadow: 0 2px 12px rgba(0,0,0,.06);
  --fs: 0.867;
  --font: "Zen Kaku Gothic New", -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
}
[data-theme="dark"] {
  --bg: #17171a;
  --panel: #202024;
  --panel-2: #26262b;
  --border: #34343a;
  --text: #e7e6e3;
  --text-sub: #9a99a0;
  --accent: #c8a86a;
  --box-bg: #1d1d21;
  --shadow: 0 2px 12px rgba(0,0,0,.4);
}
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  -webkit-text-size-adjust: 100%;
}

header {
  position: sticky; top: 0; z-index: 30;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 12px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
}
header .title { font-weight: 700; font-size: 15px; letter-spacing: .02em; }
header .title small { font-weight: 400; color: var(--text-sub); margin-left: 8px; font-size: 12px; }
.menu-btn {
  border: 1px solid var(--border); background: var(--panel-2); color: var(--text);
  width: 40px; height: 40px; border-radius: 10px; font-size: 20px; cursor: pointer;
  display: grid; place-items: center; line-height: 1;
}
.menu-btn:hover { background: var(--border); }

.input-panel { padding: 16px; background: var(--panel); border-bottom: 1px solid var(--border); }
.input-panel.collapsed { display: none; }
.input-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 10px; }
.btn {
  border: 1px solid var(--border); background: var(--panel-2); color: var(--text);
  padding: 9px 16px; border-radius: 8px; font-family: var(--font); font-size: 14px; cursor: pointer;
}
.btn:hover { background: var(--border); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { filter: brightness(1.05); }
.input-panel textarea {
  width: 100%; min-height: 120px; resize: vertical; padding: 12px;
  border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text);
  font-family: ui-monospace, "SFMono-Regular", Menlo, monospace; font-size: 12px; line-height: 1.5;
  transition: border-color .15s, background .15s;
}
.input-panel textarea.dragover {
  border-color: var(--accent);
  border-style: dashed;
  background: var(--panel-2);
}
.hint { color: var(--text-sub); font-size: 12px; }

.log-wrap { flex: 1 1 auto; overflow-y: auto; padding: 16px 16px 88px; }
.log { max-width: 1040px; margin: 0 auto; }
.empty { max-width: 820px; margin: 40px auto; text-align: center; color: var(--text-sub); font-size: 14px; line-height: 1.8; }

/* mode A: ccfolia chat style */
.msg-chat { padding: 8px 0; border-bottom: 1px solid var(--border); }
.msg-chat .name { font-weight: 700; font-size: calc(14px * var(--fs)); margin-bottom: 3px; }
.msg-chat .text { font-size: calc(15px * var(--fs)); line-height: 1.75; white-space: pre-wrap; word-break: break-word; color: var(--text); }

/* mode B: name + text inline (line breaks removed, tight spacing, aligned text start) */
.msg-inline {
  display: flex; align-items: baseline; gap: 1em;
  padding: 1px 0; font-size: calc(15px * var(--fs)); line-height: 1.5;
}
.msg-inline .name { flex: 0 0 calc(105px * var(--fs)); font-weight: 700; text-align: right; white-space: nowrap; overflow: hidden; }
.msg-inline .text { flex: 1 1 auto; min-width: 0; word-break: break-word; }

/* non-main tab block (ALL / CUSTOM views) */
.tabbox {
  margin: 8px 0 8px 26px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--box-bg);
  padding: 6px 12px 8px;
}
.tabbox .tabbox-head {
  font-size: calc(12px * var(--fs)); font-weight: 700; color: var(--text-sub);
  letter-spacing: .03em; margin-bottom: 4px;
  border-bottom: 1px dashed var(--border); padding-bottom: 4px;
}
.tabbox .msg-chat:last-child { border-bottom: none; padding-bottom: 0; }
.tabbox .msg-inline:last-child { border-bottom: none; }

footer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 25;
  display: flex; gap: 6px; padding: 10px 16px;
  background: var(--panel); border-top: 1px solid var(--border); justify-content: center;
}
.tab-btn {
  border: 1px solid var(--border); background: var(--panel-2); color: var(--text-sub);
  padding: 9px 22px; border-radius: 999px; font-family: var(--font);
  font-size: 14px; font-weight: 500; cursor: pointer; min-width: 92px;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 40;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.overlay.open { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0; width: min(320px, 86vw);
  background: var(--panel); border-left: 1px solid var(--border); z-index: 50;
  transform: translateX(100%); transition: transform .24s ease;
  display: flex; flex-direction: column; box-shadow: var(--shadow);
}
.drawer.open { transform: translateX(0); }
.drawer-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 15px;
}
.drawer-body { overflow-y: auto; padding: 6px 16px 20px; }
.close-x { border: none; background: transparent; color: var(--text); font-size: 22px; cursor: pointer; width: 32px; height: 32px; line-height: 1; }
.section { padding: 13px 0; border-bottom: 1px solid var(--border); }
.section:last-child { border-bottom: none; }
.section h3 { margin: 0 0 10px; font-size: 12px; letter-spacing: .06em; color: var(--text-sub); font-weight: 700; }

.seg { display: flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.seg button { flex: 1; border: none; background: var(--panel-2); color: var(--text-sub); padding: 9px 8px; font-family: var(--font); font-size: 13px; cursor: pointer; }
.seg button + button { border-left: 1px solid var(--border); }
.seg button.active { background: var(--accent); color: #fff; }

.block-btn {
  width: 100%; border: 1px solid var(--accent); background: var(--accent); color: #fff;
  padding: 10px; border-radius: 10px; font-family: var(--font); font-size: 13px; font-weight: 700; cursor: pointer;
}
.block-btn:hover { filter: brightness(1.05); }
.block-btn:disabled { opacity: .5; cursor: not-allowed; }
.block-note { margin: 7px 0 0; font-size: 12px; color: var(--text-sub); line-height: 1.55; }

.check-list { display: flex; flex-direction: column; gap: 2px; max-height: 300px; overflow-y: auto; }
.check-item { display: flex; align-items: center; gap: 10px; padding: 7px 6px; border-radius: 8px; cursor: pointer; font-size: 14px; }
.check-item:hover { background: var(--panel-2); }
.check-item input { width: 17px; height: 17px; accent-color: var(--accent); cursor: pointer; }
.check-item .count { margin-left: auto; color: var(--text-sub); font-size: 12px; }
.mini-actions { display: flex; gap: 8px; margin-bottom: 10px; }
.mini-actions button { border: 1px solid var(--border); background: var(--panel-2); color: var(--text-sub); padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: var(--font); }
.mini-actions button:hover { color: var(--text); }

@media (max-width: 520px) {
  .tab-btn { padding: 9px 12px; min-width: 0; flex: 1; }
  footer { gap: 8px; padding-left: 10px; padding-right: 10px; }
  header { padding-left: 10px; padding-right: 10px; }
  .input-panel { padding-left: 10px; padding-right: 10px; }
  .log-wrap { padding-left: 8px; padding-right: 8px; }
  .tabbox { margin-left: 14px; }

  /* compact menu */
  .drawer { width: min(320px, 82vw); }
  .drawer-head { padding: 12px 14px; font-size: 15px; }
  .drawer-body { padding: 4px 14px 20px; }
  .section { padding: 12px 0; }
  .section h3 { margin-bottom: 8px; }
  .seg button { padding: 8px 6px; font-size: 12px; }
  .block-btn { padding: 9px; font-size: 13px; }
  .block-note { font-size: 11px; margin-top: 6px; }
  .mini-actions button { padding: 4px 10px; }
  .check-item { padding: 6px; font-size: 13px; }
  .check-list { max-height: 240px; }
}
</style>
</head>
<body>
<header>
  <div class="title" id="appTitle">ログ成型ツール<small>ccfolia / Tekey</small></div>
  <button class="menu-btn" id="menuBtn" aria-label="メニュー">≡</button>
</header>

<section class="input-panel" id="inputPanel">
  <div class="input-row">
    <label class="btn">
      ログファイルを開く
      <input type="file" id="fileInput" accept=".html,.htm,.txt" hidden />
    </label>
    <button class="btn btn-primary" id="formatBtn">成型する</button>
    <button class="btn" id="clearBtn">クリア</button>
    <span class="hint" id="statusHint">成型前ログを貼り付け、またはここへファイルをドラッグ＆ドロップしてください。</span>
  </div>
  <textarea id="rawInput" placeholder="ここに成型前ログ（HTML）を貼り付け／ファイルをドラッグ＆ドロップ…" spellcheck="false"></textarea>
</section>

<div class="log-wrap" id="logWrap">
  <div class="empty" id="emptyState">
    ログを読み込むと、ここに成型結果が表示されます。<br />
    下のタブで表示範囲、右上「≡」で表示形式・テーマ・保存などを切り替えできます。
  </div>
  <div class="log" id="log"></div>
</div>

<footer id="footer" style="display:none;">
  <button class="tab-btn" data-view="ALL">ALL</button>
  <button class="tab-btn active" data-view="main">main</button>
  <button class="tab-btn" data-view="CUSTOM">CUSTOM</button>
</footer>

<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-head">
    <span>メニュー</span>
    <button class="close-x" id="closeMenu" aria-label="閉じる">×</button>
  </div>
  <div class="drawer-body">
    <div class="section" id="saveSection">
      <h3>保存</h3>
      <button class="block-btn" id="saveBtn" disabled>HTMLで保存</button>
      <p class="block-note">タブ・表示形式・テーマの切り替え機能を保持したまま、単体で開けるHTMLとして書き出します。</p>
    </div>
    <div class="section">
      <h3>表示形式</h3>
      <div class="seg" id="modeSeg">
        <button data-mode="chat" class="active">2列</button>
        <button data-mode="inline">1列</button>
      </div>
    </div>
    <div class="section">
      <h3>テーマ</h3>
      <div class="seg" id="themeSeg">
        <button data-theme="light" class="active">ライト</button>
        <button data-theme="dark">ダーク</button>
      </div>
    </div>
    <div class="section">
      <h3>文字サイズ</h3>
      <div class="seg" id="sizeSeg">
        <button data-fs="sm" class="active">小</button>
        <button data-fs="md">中</button>
      </div>
    </div>
    <div class="section">
      <h3>CUSTOMタブに表示するタブ</h3>
      <div class="mini-actions">
        <button id="selAll">すべて選択</button>
        <button id="selNone">すべて解除</button>
      </div>
      <div class="check-list" id="tabChecks">
        <span class="hint">ログ読み込み後に選択できます。</span>
      </div>
    </div>
  </div>
</aside>

<script id="appScript">
"use strict";
(function () {
  var state = {
    messages: [],   // {color, tab, nameText, msgHtml}
    tabs: [],
    tabCounts: {},
    view: "main",   // ALL | main | CUSTOM
    mode: "chat",   // chat | inline
    size: "sm",     // sm | md
    custom: {}
  };

  var FS_SCALE = { sm: 0.867, md: 1 };

  var $ = function (id) { return document.getElementById(id); };
  var log = $("log");
  var footer = $("footer");
  var emptyState = $("emptyState");

  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;")
            .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // approximate display width in full-width units (halfwidth chars count 0.5)
  function nameEmWidth(s) {
    var w = 0;
    for (var i = 0; i < s.length; i++) {
      var c = s.charCodeAt(i);
      if (c < 0x100 || (c >= 0xFF61 && c <= 0xFFDC) || (c >= 0xFFE8 && c <= 0xFFEE)) w += 0.5;
      else w += 1;
    }
    return w;
  }

  function stripExt(n) { return n.replace(/\.[^.\/\\]+$/, ""); }

  function setTitle(name) {
    if (!name) return;
    var t = $("appTitle"); if (t) t.textContent = name;
    document.title = name;
  }

  // preserve only <br>, escape everything else
  function nodeToSafeHtml(node) {
    var out = "";
    var kids = node.childNodes;
    for (var i = 0; i < kids.length; i++) {
      var n = kids[i];
      if (n.nodeType === 3) out += escapeHtml(n.nodeValue);
      else if (n.nodeType === 1 && n.tagName.toLowerCase() === "br") out += "<br>";
      else if (n.nodeType === 1) out += nodeToSafeHtml(n);
    }
    return out.replace(/^\s+|\s+$/g, "");
  }

  function extractTab(text) {
    var m = text.match(/\[(.+?)\]/);
    return m ? m[1].trim() : "その他";
  }

  function parseLog(raw) {
    var doc = new DOMParser().parseFromString(raw, "text/html");
    var ps = doc.querySelectorAll("p");
    var messages = [], tabs = [], counts = {};
    ps.forEach(function (p) {
      var spans = p.querySelectorAll("span");
      if (spans.length < 3) return;
      var style = p.getAttribute("style") || "";
      var cm = style.match(/color\s*:\s*(#[0-9a-fA-F]{3,8}|rgb[^;]+)/);
      var color = cm ? cm[1] : "";
      var tab = extractTab(spans[0].textContent || "");
      var nameText = (spans[1].textContent || "").replace(/^\s+|\s+$/g, "");
      var msgHtml = nodeToSafeHtml(spans[spans.length - 1]);
      messages.push({ color: color, tab: tab, nameText: nameText, msgHtml: msgHtml });
      if (!(tab in counts)) { tabs.push(tab); counts[tab] = 0; }
      counts[tab]++;
    });
    return { messages: messages, tabs: tabs, counts: counts };
  }

  // render one message per current mode
  function renderMsg(m) {
    var safeName = escapeHtml(m.nameText);
    var colorStyle = m.color ? (' style="color:' + m.color + '"') : "";
    if (state.mode === "chat") {
      // only NAME colored; keep line breaks
      return '<div class="msg-chat">' +
               '<div class="name"' + colorStyle + '>' + safeName + '</div>' +
               '<div class="text">' + m.msgHtml + '</div>' +
             '</div>';
    }
    // inline: name AND text colored; line breaks removed; auto-shrink names past 7 chars
    var flat = m.msgHtml.replace(/<br>/g, " ");
    var wem = nameEmWidth(m.nameText);
    var nameStyle = "";
    if (wem > 7) {
      nameStyle = ' style="font-size:calc(15px * var(--fs) * ' + (7 / wem).toFixed(3) + ')"';
    }
    return '<div class="msg-inline"' + colorStyle + '>' +
             '<span class="name"' + nameStyle + '>' + safeName + '</span>' +
             '<span class="text">' + flat + '</span>' +
           '</div>';
  }

  function renderBox(tab, innerHtml) {
    return '<div class="tabbox">' +
             '<div class="tabbox-head">[' + escapeHtml(tab) + ']</div>' +
             innerHtml +
           '</div>';
  }

  // main -> flat, non-main -> grouped boxes (consecutive same tab). includeFn filters messages.
  function renderFlow(includeFn) {
    var parts = [], boxTab = null, boxInner = "";
    function flush() {
      if (boxTab !== null) { parts.push(renderBox(boxTab, boxInner)); boxTab = null; boxInner = ""; }
    }
    state.messages.forEach(function (m) {
      if (!includeFn(m)) return;
      if (m.tab === "main") { flush(); parts.push(renderMsg(m)); }
      else {
        if (boxTab !== m.tab) { flush(); boxTab = m.tab; boxInner = ""; }
        boxInner += renderMsg(m);
      }
    });
    flush();
    return parts.join("");
  }

  function buildHtml() {
    if (state.view === "main") {
      return renderFlow(function (m) { return m.tab === "main"; })
             || '<div class="empty">このタブに表示できるログはありません。</div>';
    }
    if (state.view === "CUSTOM") {
      return renderFlow(function (m) { return !!state.custom[m.tab]; })
             || '<div class="empty">CUSTOMに表示するタブが選択されていません。</div>';
    }
    // ALL
    return renderFlow(function () { return true; })
           || '<div class="empty">表示できるログはありません。</div>';
  }

  function render() {
    if (!state.messages.length) return;
    log.innerHTML = buildHtml();
  }

  function buildTabChecks() {
    var box = $("tabChecks");
    if (!state.tabs.length) { box.innerHTML = '<span class="hint">ログ読み込み後に選択できます。</span>'; return; }
    var html = "";
    state.tabs.forEach(function (t) {
      var checked = state.custom[t] ? " checked" : "";
      html += '<label class="check-item">' +
                '<input type="checkbox" data-tab="' + escapeHtml(t) + '"' + checked + ' />' +
                '<span>' + escapeHtml(t) + '</span>' +
                '<span class="count">' + state.tabCounts[t] + '</span>' +
              '</label>';
    });
    box.innerHTML = html;
    box.querySelectorAll('input[type="checkbox"]').forEach(function (cb) {
      cb.addEventListener("change", function () {
        state.custom[cb.getAttribute("data-tab")] = cb.checked;
        if (state.view === "CUSTOM") render();
      });
    });
  }

  function setSegActive(id, attr, val) {
    var seg = $(id); if (!seg) return;
    seg.querySelectorAll("button").forEach(function (b) {
      b.classList.toggle("active", b.getAttribute(attr) === val);
    });
  }

  function applySize(sz) {
    state.size = sz;
    document.documentElement.style.setProperty("--fs", String(FS_SCALE[sz] || 1));
    setSegActive("sizeSeg", "data-fs", sz);
  }

  function loadRaw(raw) {
    var res = parseLog(raw);
    if (!res.messages.length) {
      $("statusHint").textContent = "ログを解析できませんでした。ccfolia / Tekey の書き出しHTMLか確認してください。";
      return;
    }
    state.messages = res.messages;
    state.tabs = res.tabs;
    state.tabCounts = res.counts;
    state.custom = {};
    state.tabs.forEach(function (t) { state.custom[t] = true; });

    emptyState.style.display = "none";
    footer.style.display = "flex";
    var sb = $("saveBtn"); if (sb) sb.disabled = false;
    $("statusHint").textContent = res.messages.length + "件のログを読み込みました（タブ" + state.tabs.length + "種）。";

    buildTabChecks();
    render();
    $("inputPanel").classList.add("collapsed");
  }

  /* ---------- functional HTML export ---------- */
  function saveHtml() {
    if (!state.messages.length) return;
    var payload = {
      messages: state.messages, tabs: state.tabs,
      counts: state.tabCounts, mode: state.mode, size: state.size
    };
    // neutralize any tag-like content so the data cannot break out of <script>
    var json = JSON.stringify(payload)
                 .replace(/</g, "\\u003c").replace(/>/g, "\\u003e")
                 .replace(/\u2028/g, "\\u2028").replace(/\u2029/g, "\\u2029");

    var bodyClone = document.body.cloneNode(true);
    var lg = bodyClone.querySelector("#log"); if (lg) lg.innerHTML = "";
    var tc = bodyClone.querySelector("#tabChecks"); if (tc) tc.innerHTML = "";
    var ta = bodyClone.querySelector("#rawInput"); if (ta) ta.textContent = "";
    var dr = bodyClone.querySelector("#drawer"); if (dr) { dr.classList.remove("open"); dr.setAttribute("aria-hidden", "true"); }
    var ov = bodyClone.querySelector("#overlay"); if (ov) ov.classList.remove("open");

    var appScript = bodyClone.querySelector("#appScript");
    var dataScript = document.createElement("script");
    dataScript.textContent = "window.__EMBEDDED_LOG__=" + json + ";";
    appScript.parentNode.insertBefore(dataScript, appScript);

    var themeAttr = (document.documentElement.getAttribute("data-theme") === "dark") ? ' data-theme="dark"' : "";
    var headHtml = document.head.cloneNode(true).innerHTML;
    var out = "<!DOCTYPE html>\n<html lang=\"ja\"" + themeAttr + ">\n<head>" +
              headHtml + "</head>\n<body>" + bodyClone.innerHTML + "</body>\n</html>";

    var blob = new Blob([out], { type: "text/html;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "ccfolia_log_formatted.html";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }

  // load data baked into an exported file
  function loadEmbedded(d) {
    state.messages = d.messages; state.tabs = d.tabs; state.tabCounts = d.counts;
    state.custom = {};
    state.tabs.forEach(function (t) { state.custom[t] = true; });
    if (d.mode) { state.mode = d.mode; setSegActive("modeSeg", "data-mode", d.mode); }
    applySize(d.size || "sm");
    setSegActive("themeSeg", "data-theme",
      document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light");
    emptyState.style.display = "none";
    footer.style.display = "flex";
    var ip = $("inputPanel"); if (ip) ip.style.display = "none";
    var ss = $("saveSection"); if (ss) ss.style.display = "none";
    buildTabChecks();
    render();
  }

  /* ---------- events: input ---------- */
  $("fileInput").addEventListener("change", function (e) {
    var f = e.target.files && e.target.files[0];
    if (!f) return;
    var reader = new FileReader();
    reader.onload = function () { $("rawInput").value = String(reader.result); setTitle(stripExt(f.name)); loadRaw($("rawInput").value); };
    reader.readAsText(f);
  });

  $("formatBtn").addEventListener("click", function () {
    var raw = $("rawInput").value.trim();
    if (!raw) { $("statusHint").textContent = "ログを貼り付けるか、ファイルをドラッグ＆ドロップしてください。"; return; }
    loadRaw(raw);
  });

  $("clearBtn").addEventListener("click", function () {
    $("rawInput").value = "";
    state.messages = []; state.tabs = []; state.tabCounts = {}; state.custom = {};
    log.innerHTML = "";
    emptyState.style.display = "";
    footer.style.display = "none";
    var sb = $("saveBtn"); if (sb) sb.disabled = true;
    buildTabChecks();
    $("statusHint").textContent = "成型前ログを貼り付け、またはここへファイルをドラッグ＆ドロップしてください。";
    $("inputPanel").classList.remove("collapsed");
  });

  /* ---------- events: drag & drop onto the paste area ---------- */
  (function () {
    var ta = $("rawInput");
    if (!ta) return;
    ["dragenter", "dragover"].forEach(function (ev) {
      ta.addEventListener(ev, function (e) {
        e.preventDefault(); e.stopPropagation();
        ta.classList.add("dragover");
      });
    });
    ["dragleave", "dragend"].forEach(function (ev) {
      ta.addEventListener(ev, function (e) {
        e.preventDefault(); e.stopPropagation();
        ta.classList.remove("dragover");
      });
    });
    ta.addEventListener("drop", function (e) {
      e.preventDefault(); e.stopPropagation();
      ta.classList.remove("dragover");
      var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (!f) return;
      var reader = new FileReader();
      reader.onload = function () { ta.value = String(reader.result); setTitle(stripExt(f.name)); loadRaw(ta.value); };
      reader.readAsText(f);
    });
  })();

  /* ---------- events: footer tabs ---------- */
  footer.querySelectorAll(".tab-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      footer.querySelectorAll(".tab-btn").forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
      state.view = btn.getAttribute("data-view");
      render();
      $("logWrap").scrollTop = 0;
    });
  });

  /* ---------- events: menu ---------- */
  function openMenu() { $("drawer").classList.add("open"); $("overlay").classList.add("open"); $("drawer").setAttribute("aria-hidden", "false"); }
  function closeMenu() { $("drawer").classList.remove("open"); $("overlay").classList.remove("open"); $("drawer").setAttribute("aria-hidden", "true"); }
  $("menuBtn").addEventListener("click", openMenu);
  $("closeMenu").addEventListener("click", closeMenu);
  $("overlay").addEventListener("click", closeMenu);

  var sbtn = $("saveBtn"); if (sbtn) sbtn.addEventListener("click", saveHtml);

  $("modeSeg").addEventListener("click", function (e) {
    var b = e.target.closest("button"); if (!b) return;
    setSegActive("modeSeg", "data-mode", b.getAttribute("data-mode"));
    state.mode = b.getAttribute("data-mode");
    render();
  });

  $("themeSeg").addEventListener("click", function (e) {
    var b = e.target.closest("button"); if (!b) return;
    setSegActive("themeSeg", "data-theme", b.getAttribute("data-theme"));
    if (b.getAttribute("data-theme") === "dark") document.documentElement.setAttribute("data-theme", "dark");
    else document.documentElement.removeAttribute("data-theme");
  });

  $("sizeSeg").addEventListener("click", function (e) {
    var b = e.target.closest("button"); if (!b) return;
    applySize(b.getAttribute("data-fs"));
  });

  $("selAll").addEventListener("click", function () {
    state.tabs.forEach(function (t) { state.custom[t] = true; });
    buildTabChecks(); if (state.view === "CUSTOM") render();
  });
  $("selNone").addEventListener("click", function () {
    state.tabs.forEach(function (t) { state.custom[t] = false; });
    buildTabChecks(); if (state.view === "CUSTOM") render();
  });

  /* ---------- init (exported file) ---------- */
  if (window.__EMBEDDED_LOG__) {
    try { loadEmbedded(window.__EMBEDDED_LOG__); } catch (err) {}
  }
})();
</script>
</body>
</html>
